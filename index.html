<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lock in H3 — Halo 3 MCC Stat Tracker</title>
<meta name="description" content="Halo 3 MCC series stat tracker — upload scoreboard screenshots and get a full report.">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0; --muted: #6b7280; --accent: #4a9eff;
    --accent-dim: rgba(74,158,255,0.12); --red: #ff5555;
    --red-dim: rgba(255,85,85,0.12); --red-border: rgba(255,85,85,0.25);
    --blue: #4a9eff; --blue-dim: rgba(74,158,255,0.12);
    --blue-border: rgba(74,158,255,0.25); --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1); --yellow: #fbbf24; --gold: #f59e0b;
    --s1: #a78bfa; --s1-dim: rgba(167,139,250,0.12); --s1-border: rgba(167,139,250,0.25);
    --s2: #fb923c; --s2-dim: rgba(251,146,60,0.12); --s2-border: rgba(251,146,60,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 1000; }
  .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }
  header { border-bottom: 1px solid var(--border); padding: 1.5rem 0; margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
  .logo em { font-style: normal; color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 1rem; }
  .nav-link { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-decoration: none; border: 1px solid var(--border2); padding: 5px 12px; border-radius: 4px; transition: all 0.15s; }
  .nav-link:hover { color: var(--accent); border-color: var(--accent); }
  .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: 10px; padding: 3rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); margin-bottom: 1rem; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
  .upload-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.4rem; }
  .upload-hint-text { font-size: 13px; color: var(--muted); }
  .file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .file-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
  .file-thumb { width: 56px; height: 42px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border2); flex-shrink: 0; }
  .file-info { flex: 1; overflow: hidden; }
  .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .file-game-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--blue-border); padding: 3px 8px; border-radius: 3px; flex-shrink: 0; }
  .file-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 2px 6px; line-height: 1; transition: color 0.15s; }
  .file-remove:hover { color: var(--red); }
  .analyze-btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .analyze-btn:hover { background: #74b4ff; transform: translateY(-1px); }
  .analyze-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }
  .progress-wrap { margin-top: 1.25rem; display: none; }
  .progress-track { background: var(--surface2); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 4px; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; color: var(--muted); }
  .error-box { background: var(--red-dim); border: 1px solid var(--red-border); border-radius: 8px; padding: 12px 16px; font-size: 13px; color: var(--red); margin-top: 1rem; display: none; white-space: pre-wrap; font-family: monospace; }
  .report { margin-top: 2.5rem; display: none; }
  .report-header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
  .report-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
  .report-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .series-score { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; margin-bottom: 2rem; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; text-align: center; position: relative; }
  .team-card.winner-s1 { border-color: var(--s1-border); background: var(--s1-dim); }
  .team-card.winner-s2 { border-color: var(--s2-border); background: var(--s2-dim); }
  .winner-pill { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; background: var(--accent); color: #000; padding: 3px 12px; border-radius: 99px; white-space: nowrap; }
  .team-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
  .team-players { font-size: 11px; color: var(--muted); margin-bottom: 0.5rem; line-height: 1.4; }
  .team-wins { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 800; line-height: 1; }
  .vs-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--muted); letter-spacing: 2px; text-align: center; }
  .callouts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem; }
  .mvp-strip { border-radius: 10px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
  .mvp-strip-gold { background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.03)); border: 1px solid rgba(245,158,11,0.2); }
  .mvp-strip-red { background: linear-gradient(135deg,rgba(255,85,85,0.08),rgba(255,85,85,0.03)); border: 1px solid rgba(255,85,85,0.2); }
  .mvp-strip-blue { background: linear-gradient(135deg,rgba(74,158,255,0.08),rgba(74,158,255,0.03)); border: 1px solid rgba(74,158,255,0.2); }
  .mvp-strip-green { background: linear-gradient(135deg,rgba(74,222,128,0.08),rgba(74,222,128,0.03)); border: 1px solid rgba(74,222,128,0.2); }
  .mvp-star { font-size: 24px; flex-shrink: 0; }
  .mvp-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .eyebrow-gold { color: var(--gold); }
  .eyebrow-red { color: var(--red); }
  .eyebrow-blue { color: var(--accent); }
  .eyebrow-green { color: var(--green); }
  .mvp-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .mvp-stats { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .stat-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 2rem; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 14px; text-align: left; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
  thead th:not(:first-child) { text-align: center; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tbody td:not(:first-child) { text-align: center; }
  tbody tr:last-child td { border-bottom: none; }
  .team-divider td { padding: 7px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .divider-s1 td { color: var(--s1); background: rgba(167,139,250,0.05); }
  .divider-s2 td { color: var(--s2); background: rgba(251,146,60,0.05); }
  .row-s1 td { background: rgba(167,139,250,0.03); }
  .row-s2 td { background: rgba(251,146,60,0.03); }
  .player-name-cell { font-weight: 600; font-size: 14px; }
  .kd-pos { color: var(--green); font-weight: 600; }
  .kd-neg { color: var(--red); }
  .kd-neu { color: var(--muted); }
  .pm-pos { color: var(--green); font-weight: 600; }
  .pm-neg { color: var(--red); }
  .pm-zero { color: var(--muted); }
  .games-grid { display: flex; flex-direction: column; gap: 1rem; }
  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .game-card-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .game-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .game-win-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 4px; }
  .badge-s1 { background: var(--s1-dim); color: var(--s1); border: 1px solid var(--s1-border); }
  .badge-s2 { background: var(--s2-dim); color: var(--s2); border: 1px solid var(--s2-border); }
  .color-tag { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; text-transform: uppercase; letter-spacing: 0.5px; }
  .color-tag-red { background: var(--red-dim); color: var(--red); }
  .color-tag-blue { background: var(--blue-dim); color: var(--blue); }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) { .series-score { grid-template-columns: 1fr auto 1fr; gap: 0.5rem; } .team-wins { font-size: 38px; } thead th, tbody td { padding: 8px 10px; font-size: 12px; } .callouts-grid { grid-template-columns: 1fr; } }
  @media print {
    body { background: #fff !important; color: #111 !important; font-size: 12px; }
    body::before { display: none; }
    header, .upload-zone, .file-list, .analyze-btn, .progress-wrap, .error-box, .export-btn-wrap, .share-btn-wrap, .lb-btn-wrap { display: none !important; }
    .report { display: block !important; margin-top: 0; }
    .container { max-width: 100%; padding: 0 1rem; }
    :root { --bg: #fff; --surface: #f5f5f5; --surface2: #ebebeb; --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.18); --text: #111; --muted: #555; --accent: #185FA5; --accent-dim: #e6f1fb; --red: #c0392b; --red-dim: #fdf0ee; --red-border: rgba(192,57,43,0.3); --blue: #185FA5; --blue-dim: #e6f1fb; --blue-border: rgba(24,95,165,0.3); --green: #1a7a3a; --gold: #b8860b; --s1: #6d28d9; --s1-dim: #f3f0ff; --s1-border: rgba(109,40,217,0.3); --s2: #c2410c; --s2-dim: #fff7ed; --s2-border: rgba(194,65,12,0.3); }
    .report-title { font-size: 22px; } .team-wins { font-size: 36px; }
    .stat-table-wrap, .game-card { border: 1px solid #ccc !important; break-inside: avoid; }
    .game-card { margin-bottom: 1rem; page-break-inside: avoid; }
    thead th { background: #ebebeb !important; color: #555 !important; }
    .team-card { border: 1px solid #ccc !important; }
    .winner-pill { background: #185FA5 !important; color: #fff !important; }
    .mvp-strip { border: 1px solid #ccc !important; background: #fffbf0 !important; }
    .print-header { display: block !important; }
  }
  .print-header { display: none; text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #185FA5; }
  .print-header-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #185FA5; }
  .print-header-date { font-size: 12px; color: #555; margin-top: 4px; }
  .export-btn-wrap { margin-top: 1.5rem; display: none; }
  .export-btn { width: 100%; padding: 13px; background: transparent; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .export-btn:hover { background: var(--accent-dim); }
  .share-btn-wrap { margin-top: 0.75rem; display: none; }
  .share-btn { width: 100%; padding: 13px; background: transparent; color: #4ade80; border: 1.5px solid #4ade80; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .share-btn:hover { background: rgba(74,222,128,0.08); }
  .share-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .share-panel { background: var(--surface); border: 1px solid rgba(74,222,128,0.25); border-radius: 10px; padding: 1.25rem 1.5rem; margin-top: 0.75rem; display: none; }
  .share-panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #4ade80; margin-bottom: 0.75rem; }
  .share-url-row { display: flex; gap: 8px; align-items: stretch; }
  .share-url-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: monospace; font-size: 13px; outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { padding: 9px 16px; background: #4ade80; color: #000; border: none; border-radius: 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .copy-btn:hover { background: #86efac; }
  .copy-btn.copied { background: var(--surface2); color: var(--muted); }
  .lb-btn-wrap { margin-top: 0.75rem; display: none; }
  .lb-btn { width: 100%; padding: 13px; background: transparent; color: var(--gold); border: 1.5px solid var(--gold); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .lb-btn:hover { background: rgba(245,158,11,0.08); }
  .lb-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .lb-btn.saved { background: rgba(74,222,128,0.08); color: #4ade80; border-color: #4ade80; cursor: default; }
  .lb-btn.duplicate { background: rgba(107,114,128,0.1); color: var(--muted); border-color: var(--muted); cursor: default; }
  .lb-force-btn { width: 100%; margin-top: 0.5rem; padding: 10px; background: transparent; color: var(--red); border: 1.5px solid var(--red-border); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; display: none; align-items: center; justify-content: center; gap: 8px; }
  .lb-force-btn:hover { background: var(--red-dim); }
  .view-only-banner { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: 8px; padding: 10px 16px; margin-bottom: 1.5rem; font-size: 13px; color: #4ade80; display: flex; align-items: center; gap: 10px; }
  .not-found-msg { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .not-found-msg h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text); margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Lock in <em>H3</em></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Report</a>
      <a href="leaderboard.html" class="nav-link">Leaderboard</a>
    </div>
  </header>
  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <span class="upload-icon">🎮</span>
    <div class="upload-title">Drop scoreboard screenshots here</div>
    <div class="upload-hint-text">Click or drag & drop · JPG, PNG · 2v2 or 4v4 · up to best-of-5</div>
  </div>
  <div class="file-list" id="fileList"></div>
  <button class="analyze-btn" id="analyzeBtn" disabled>Analyze Series</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Analyzing...</div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="report" id="report"></div>
  <div class="export-btn-wrap" id="exportWrap">
    <button class="export-btn" id="exportBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export as PDF
    </button>
  </div>
  <div class="share-btn-wrap" id="shareBtnWrap">
    <button class="share-btn" id="shareBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Get Shareable Link
    </button>
    <div class="share-panel" id="sharePanel">
      <div class="share-panel-title">Shareable Report Link</div>
      <div class="share-url-row">
        <input type="text" class="share-url-input" id="shareUrlInput" readonly placeholder="Saving report...">
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
    </div>
  </div>
  <div class="lb-btn-wrap" id="lbBtnWrap">
    <button class="lb-btn" id="lbBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Add to Leaderboard Stats
    </button>
    <button class="lb-force-btn" id="lbForceBtn">
      ⚠ Stats missing? Force add this series
    </button>
  </div>
</div>

<script>
const WORKER_URL = 'https://lockinh3.gmil88.workers.dev';
const BASE_URL = 'https://itzg3neh3.github.io/lockinh3/';

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileListEl = document.getElementById('fileList');
const analyzeBtn = document.getElementById('analyzeBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const errorBox = document.getElementById('errorBox');
const reportEl = document.getElementById('report');
let files = [];

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

function handleFiles(incoming) {
  for (const f of incoming) {
    if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
  }
  renderList();
  analyzeBtn.disabled = files.length === 0;
}

function renderList() {
  fileListEl.innerHTML = '';
  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    const thumb = document.createElement('img');
    thumb.className = 'file-thumb';
    thumb.src = URL.createObjectURL(f);
    const info = document.createElement('div');
    info.className = 'file-info';
    info.innerHTML = `<div class="file-name">${f.name}</div><div class="file-meta">${(f.size/1024).toFixed(0)} KB</div>`;
    const badge = document.createElement('div');
    badge.className = 'file-game-badge';
    badge.textContent = `Game ${i+1}`;
    const rm = document.createElement('button');
    rm.className = 'file-remove';
    rm.textContent = '×';
    rm.onclick = e => { e.stopPropagation(); files.splice(i,1); renderList(); analyzeBtn.disabled = files.length === 0; };
    item.append(thumb, info, badge, rm);
    fileListEl.appendChild(item);
  });
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

analyzeBtn.addEventListener('click', async () => {
  if (!files.length) return;
  errorBox.style.display = 'none';
  reportEl.style.display = 'none';
  reportEl.innerHTML = '';
  document.getElementById('lbBtnWrap').style.display = 'none';
  const lbBtn = document.getElementById('lbBtn');
  const lbForceBtn = document.getElementById('lbForceBtn');
  lbBtn.className = 'lb-btn';
  lbBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Add to Leaderboard Stats';
  lbBtn.disabled = false;
  lbForceBtn.style.display = 'none';
  analyzeBtn.disabled = true;
  analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing...';
  progressWrap.style.display = 'block';
  setProgress(0, 'Starting analysis...');
  const results = [], errors = [];
  for (let i = 0; i < files.length; i++) {
    setProgress(Math.round((i / files.length) * 90), `Analyzing game ${i+1} of ${files.length}...`);
    try {
      const b64 = await toBase64(files[i]);
      const mt = files[i].type || 'image/jpeg';
      const data = await callClaude(b64, mt, i+1);
      results.push({...data, gameNumber: i+1});
    } catch(err) { errors.push({ gameNumber: i+1, message: err.message }); }
  }
  setProgress(100, 'Building report...');
  setTimeout(() => {
    progressWrap.style.display = 'none';
    analyzeBtn.innerHTML = 'Analyze Series';
    analyzeBtn.disabled = false;
    if (!results.length) { showError('Could not analyze any screenshots.\n\nErrors:\n' + errors.map(e=>`Game ${e.gameNumber}: ${e.message}`).join('\n')); return; }
    renderReport(results, errors);
  }, 400);
});

async function callClaude(b64, mediaType, gameNum) {
  const response = await fetch(WORKER_URL + '/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
          { type: 'text', text: `This is a Halo 3 MCC end-of-game scoreboard screenshot (game ${gameNum} in a series).

Return ONLY a raw JSON object — zero markdown, zero code fences, zero extra text:
{"gameType":"Slayer","winner":"Red","redTeam":[{"name":"xXPlayerXx","kills":12,"deaths":8,"assists":3,"ballTime":null,"flagCaps":null,"hillTime":null}],"blueTeam":[{"name":"AnotherPlayer","kills":9,"deaths":11,"assists":1,"ballTime":null,"flagCaps":null,"hillTime":null}]}

STEP 1 — READ THE GAME TYPE FROM THE TITLE TEXT at the top of the scoreboard.

STEP 2 — THE GOLDEN RULE: The scoreboard ALWAYS has 4 columns in this order: SCORE | KILLS | ASSISTS | DEATHS. The SCORE column is NEVER kills except in Slayer. Read every column by its header label, not its position.

STEP 3 — IDENTIFY MODE AND MAP SCORE COLUMN:

HARDCORE BALL / ODDBALL (title contains "BALL" or "ODDBALL"):
Score column = Ball Time in SECONDS → store in ballTime. NEVER store in kills.
ballTime must NEVER be null for these games.
REAL EXAMPLE: Plague NYC: Score=71, Kills=21 → ballTime=71, kills=21

HARDCORE KING / KING OF THE HILL (title contains "KING" or "HILL" or "KOTH"):
Score column = Hill Time in SECONDS → store in hillTime. NEVER store in kills.
hillTime must NEVER be null for these games.
REAL EXAMPLE: Rights: Score=76, Kills=28 → hillTime=76, kills=28

CTF / FLAG CAPS (title contains "30" OR "CTF" OR "FLAG" OR "5FLAG"):
Score column = Flag Caps (small integer 0-5) → store in flagCaps. NEVER store in kills.
REAL EXAMPLE: Score=3, Kills=11 → flagCaps=3, kills=11

SLAYER / HARDCORE TS (title contains "SLAYER" or "TS", no "30", no "KING", no "BALL", no "CTF", no "FLAG"):
Score column = Kills. Use the Kills column value.

STEP 4 — READ TEAM COLORS:
Every player row has a colored background. Look carefully at each row's background color.
BLUE background rows → these players go in blueTeam array.
RED background rows → these players go in redTeam array.
IMPORTANT: The team listed first at the TOP of the scoreboard is NOT always redTeam.
Do NOT assume position in the list determines team color. ONLY use the row background color.

STEP 5 — VERIFY THE WINNER USING SCORES (do not rely solely on the title):
For CTF/"30" games: Add up flagCaps for redTeam and blueTeam separately. The team with MORE caps wins. Set winner to "Red" or "Blue" accordingly.
For KOTH games: Add up hillTime for each team. Higher total wins.
For BALL games: Add up ballTime for each team. Higher total wins.
For Slayer/TS: The team with more kills wins. Trust the title.
The "RED TEAM WON" / "BLUE TEAM WON" title can occasionally be wrong — always verify with the actual scores for objective modes.

PLAYER NAMES: TOP line = clan tag (ignore). BOTTOM line = real gamertag (use this).
Never duplicate. 4v4 = exactly 4 per team. 2v2 = exactly 2 per team.

- gameType: exact title text
- winner: "Red" or "Blue" — verified by score totals for objective modes
- ballTime: seconds integer for BALL/ODDBALL only — NEVER null for these games
- hillTime: seconds integer for KING/HILL/KOTH only — NEVER null for these games
- flagCaps: integer for CTF/"30"/"5FLAG" games — can be 0 but null only for non-CTF games
- kills: the KILLS column value — always separate from Score` }
        ]
      }]
    })
  });
  if (!response.ok) { const t = await response.text().catch(() => ''); throw new Error(`API error ${response.status}: ${t.slice(0,200)}`); }
  const data = await response.json();
  const raw = (data.content || []).map(c => c.text || '').join('').trim();
  const cleaned = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try { parsed = JSON.parse(cleaned); } catch(e) { throw new Error(`Could not parse response: ${raw.slice(0,200)}`); }
  return parsed;
}

function setProgress(pct, label) { progressFill.style.width = pct + '%'; progressText.textContent = label; }
function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
function parseTimeSecs(t) {
  if (t === null || t === undefined || t === 'null' || t === '') return 0;
  const s = String(t).trim();
  if (s.includes(':')) { const p = s.split(':'); return parseInt(p[0]||0)*60 + parseInt(p[1]||0); }
  return parseInt(s) || 0;
}
function fmtTime(sec) { const m = Math.floor(sec/60), s = sec%60; return `${m}:${String(s).padStart(2,'0')}`; }
function fmtHillOrBall(val) {
  if (val === null || val === undefined || val === 'null' || val === '') return '—';
  const secs = parseTimeSecs(val);
  return secs === 0 ? '0:00' : fmtTime(secs);
}
function kd(k,d) { return d===0?(k>0?k.toFixed(2):'0.00'):(k/d).toFixed(2); }
function kdClass(k,d) { const r=d===0?k:k/d; return r>1.1?'kd-pos':r<0.9?'kd-neg':'kd-neu'; }
function pm(k,d) { const v=(k||0)-(d||0); return (v>0?'+':'')+v; }
function pmClass(k,d) { const v=(k||0)-(d||0); return v>0?'pm-pos':v<0?'pm-neg':'pm-zero'; }
function isOddball(gt) { return !!(gt||'').toLowerCase().match(/oddball|ball/); }
function isCTF(gt) { return !!(gt||'').toLowerCase().match(/ctf|flag|30/); }
function isKOTH(gt) { return !!(gt||'').toLowerCase().match(/king|hill|koth/); }

// Verify winner from actual scores — overrides Claude's winner if scores say otherwise
function verifyWinner(game) {
  const gt = game.gameType || '';
  const red = game.redTeam || [];
  const blue = game.blueTeam || [];
  if (isCTF(gt)) {
    const redCaps = red.reduce((s,p) => s + (p.flagCaps||0), 0);
    const blueCaps = blue.reduce((s,p) => s + (p.flagCaps||0), 0);
    if (redCaps !== blueCaps) return redCaps > blueCaps ? 'Red' : 'Blue';
  }
  if (isKOTH(gt)) {
    const redHill = red.reduce((s,p) => s + parseTimeSecs(p.hillTime), 0);
    const blueHill = blue.reduce((s,p) => s + parseTimeSecs(p.hillTime), 0);
    if (redHill !== blueHill) return redHill > blueHill ? 'Red' : 'Blue';
  }
  if (isOddball(gt)) {
    const redBall = red.reduce((s,p) => s + parseTimeSecs(p.ballTime), 0);
    const blueBall = blue.reduce((s,p) => s + parseTimeSecs(p.ballTime), 0);
    if (redBall !== blueBall) return redBall > blueBall ? 'Red' : 'Blue';
  }
  // For Slayer or if scores are tied, trust Claude's winner
  return game.winner;
}

function calcObjMVP(players, games) {
  const hasObj = games.some(g => isOddball(g.gameType) || isCTF(g.gameType) || isKOTH(g.gameType));
  if (!hasObj) return null;
  const totalBall = players.reduce((s,p)=>s+p.ballSecs,0);
  const totalCaps = players.reduce((s,p)=>s+p.flagCaps,0);
  const totalHill = players.reduce((s,p)=>s+p.hillSecs,0);
  let best = null, bestScore = -1;
  players.forEach(p => {
    const shares = [];
    if (totalBall > 0) shares.push(p.ballSecs / totalBall);
    if (totalCaps > 0) shares.push(p.flagCaps / totalCaps);
    if (totalHill > 0) shares.push(p.hillSecs / totalHill);
    if (!shares.length) return;
    const score = shares.reduce((a,b)=>a+b,0) / shares.length;
    if (score > bestScore) { bestScore = score; best = p; }
  });
  return best;
}

function buildSquads(games) {
  if (!games.length) return { squad1: new Set(), squad2: new Set() };
  const g1 = games[0];
  const squad1 = new Set((g1.redTeam||[]).map(p=>p.name).filter(Boolean));
  const squad2 = new Set((g1.blueTeam||[]).map(p=>p.name).filter(Boolean));
  return { squad1, squad2 };
}

function getSquad(name, squad1, squad2) {
  if (squad1.has(name)) return 1;
  if (squad2.has(name)) return 2;
  for (const n of squad1) { if (n&&name&&n.toLowerCase()===name.toLowerCase()) return 1; }
  for (const n of squad2) { if (n&&name&&n.toLowerCase()===name.toLowerCase()) return 2; }
  return 1;
}

async function submitToLeaderboard(force = false) {
  const btn = document.getElementById('lbBtn');
  const forceBtn = document.getElementById('lbForceBtn');
  if (!window._lastGames || !window._seriesWinner) return;
  if (window._seriesWinner === 0) {
    btn.className = 'lb-btn duplicate';
    btn.innerHTML = '— Tied series not added to leaderboard';
    btn.disabled = true;
    return;
  }
  btn.disabled = true;
  forceBtn.style.display = 'none';
  btn.innerHTML = '<span class="spinner" style="border-top-color:currentColor"></span> Saving...';
  try {
    const resp = await fetch(WORKER_URL + '/leaderboard/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ games: window._lastGames, seriesWinner: window._seriesWinner, force }),
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);
    if (result.status === 'duplicate') {
      btn.className = 'lb-btn duplicate';
      btn.innerHTML = '— Already in leaderboard · not counted twice';
      btn.disabled = true;
      forceBtn.style.display = 'flex';
    } else {
      btn.className = 'lb-btn saved';
      btn.innerHTML = '✓ Added to leaderboard successfully';
      btn.disabled = true;
      forceBtn.style.display = 'none';
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '⚠ Save failed — try again';
    btn.className = 'lb-btn';
  }
}

document.getElementById('lbBtn').addEventListener('click', () => submitToLeaderboard(false));

document.getElementById('lbForceBtn').addEventListener('click', async () => {
  const forceBtn = document.getElementById('lbForceBtn');
  if (!confirm('This will add the series stats again even though it was already fingerprinted.\n\nOnly use this if you confirmed the stats were missing from the leaderboard. Continue?')) return;
  forceBtn.disabled = true;
  forceBtn.textContent = 'Force adding...';
  await submitToLeaderboard(true);
  forceBtn.disabled = false;
});

function renderReport(games, errors) {
  // Apply score-based winner verification for every game before building the report
  games = games.map(g => ({ ...g, winner: verifyWinner(g) }));

  const { squad1, squad2 } = buildSquads(games);

  let s1Wins=0, s2Wins=0;
  games.forEach(g => {
    const wt = g.winner==='Red'?(g.redTeam||[]):(g.blueTeam||[]);
    if (wt.length>0) {
      let s1Votes=0, s2Votes=0;
      wt.forEach(p => { if (getSquad(p.name,squad1,squad2)===1) s1Votes++; else s2Votes++; });
      if (s1Votes > s2Votes) s1Wins++; else s2Wins++;
    }
  });
  const winner = s1Wins>s2Wins?1:s2Wins>s1Wins?2:0;

  const agg = {};
  games.forEach(g => {
    [...(g.redTeam||[]).map(p=>({...p})), ...(g.blueTeam||[]).map(p=>({...p}))].forEach(p => {
      if (!p.name) return;
      const sq = getSquad(p.name, squad1, squad2);
      if (!agg[p.name]) agg[p.name] = {name:p.name,squad:sq,kills:0,deaths:0,assists:0,ballSecs:0,flagCaps:0,hillSecs:0};
      const a = agg[p.name];
      a.kills+=p.kills||0; a.deaths+=p.deaths||0; a.assists+=p.assists||0;
      a.ballSecs+=parseTimeSecs(p.ballTime); a.flagCaps+=p.flagCaps||0; a.hillSecs+=parseTimeSecs(p.hillTime);
    });
  });

  const players = Object.values(agg);
  const topKiller = [...players].sort((a,b)=>b.kills-a.kills)[0];
  const bottomFragger = [...players].filter(p=>p.deaths>0).sort((a,b)=>(a.kills/a.deaths)-(b.kills/b.deaths))[0];
  const assistKing = [...players].sort((a,b)=>b.assists-a.assists)[0];
  const objMVP = calcObjMVP(players, games);
  const hasOddball = games.some(g=>isOddball(g.gameType));
  const hasCTF = games.some(g=>isCTF(g.gameType));
  const hasKOTH = games.some(g=>isKOTH(g.gameType));
  const s1Players = [...squad1].join(', ');
  const s2Players = [...squad2].join(', ');
  const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  function objMVPStats(p) {
    const parts = [];
    if (p.flagCaps > 0) parts.push(`${p.flagCaps} Flag Caps`);
    if (p.hillSecs > 0) parts.push(`${fmtTime(p.hillSecs)} Hill Time`);
    if (p.ballSecs > 0) parts.push(`${fmtTime(p.ballSecs)} Ball Time`);
    return parts.join(' &nbsp;·&nbsp; ') || 'Objective contributor';
  }

  let html = `
  <div class="print-header">
    <div class="print-header-logo">Lock in H3 — Series Report</div>
    <div class="print-header-date">Generated ${dateStr}</div>
  </div>
  <div class="report-header">
    <div class="report-eyebrow">Series Complete · ${games.length} Game${games.length!==1?'s':''}</div>
    <div class="report-title">${winner===0?'Series Tied':'Squad '+winner+' Wins the Series'}</div>
  </div>
  <div class="series-score">
    <div class="team-card ${winner===1?'winner-s1':''}">
      ${winner===1?'<div class="winner-pill">Winner</div>':''}
      <div class="team-label">Squad 1</div>
      <div class="team-players">${s1Players}</div>
      <div class="team-wins" style="color:var(--s1)">${s1Wins}</div>
    </div>
    <div class="vs-sep">VS</div>
    <div class="team-card ${winner===2?'winner-s2':''}">
      ${winner===2?'<div class="winner-pill">Winner</div>':''}
      <div class="team-label">Squad 2</div>
      <div class="team-players">${s2Players}</div>
      <div class="team-wins" style="color:var(--s2)">${s2Wins}</div>
    </div>
  </div>
  <div class="callouts-grid">
    <div>
      ${topKiller?`<div class="mvp-strip mvp-strip-gold" style="margin-bottom:0.75rem"><div class="mvp-star">⭐</div><div><div class="mvp-eyebrow eyebrow-gold">Series Top Fragger</div><div class="mvp-name">${topKiller.name}</div><div class="mvp-stats">${topKiller.kills} Kills &nbsp;·&nbsp; ${topKiller.deaths} Deaths &nbsp;·&nbsp; ${kd(topKiller.kills,topKiller.deaths)} K/D &nbsp;·&nbsp; ${pm(topKiller.kills,topKiller.deaths)} +/-</div></div></div>`:''}
      ${bottomFragger?`<div class="mvp-strip mvp-strip-red"><div class="mvp-star">🍆</div><div><div class="mvp-eyebrow eyebrow-red">Series Top Shitter</div><div class="mvp-name">${bottomFragger.name}</div><div class="mvp-stats">${bottomFragger.kills} Kills &nbsp;·&nbsp; ${bottomFragger.deaths} Deaths &nbsp;·&nbsp; ${kd(bottomFragger.kills,bottomFragger.deaths)} K/D &nbsp;·&nbsp; ${pm(bottomFragger.kills,bottomFragger.deaths)} +/-</div></div></div>`:''}
    </div>
    <div>
      ${assistKing?`<div class="mvp-strip mvp-strip-blue" style="margin-bottom:0.75rem"><div class="mvp-star">🤝</div><div><div class="mvp-eyebrow eyebrow-blue">Series Assist King</div><div class="mvp-name">${assistKing.name}</div><div class="mvp-stats">${assistKing.assists} Assists &nbsp;·&nbsp; ${assistKing.kills} Kills &nbsp;·&nbsp; ${assistKing.deaths} Deaths &nbsp;·&nbsp; ${kd(assistKing.kills,assistKing.deaths)} K/D</div></div></div>`:''}
      ${objMVP?`<div class="mvp-strip mvp-strip-green"><div class="mvp-star">🎯</div><div><div class="mvp-eyebrow eyebrow-green">Series OBJ MVP</div><div class="mvp-name">${objMVP.name}</div><div class="mvp-stats">${objMVPStats(objMVP)}</div></div></div>`:''}
    </div>
  </div>`;

  html += `<div class="section-title">Overall Player Stats</div><div class="stat-table-wrap"><table><thead><tr>
    <th>Player</th><th>Kills</th><th>Deaths</th><th>Assists</th><th>K/D</th><th>+/-</th>
    ${hasOddball?'<th>Ball Time</th>':''}${hasCTF?'<th>Flag Caps</th>':''}${hasKOTH?'<th>Hill Time</th>':''}
  </tr></thead><tbody>`;
  [1,2].forEach(sq => {
    html += `<tr class="team-divider divider-s${sq}"><td colspan="20">Squad ${sq}</td></tr>`;
    players.filter(p=>p.squad===sq).forEach(p => {
      html += `<tr class="row-s${sq}"><td class="player-name-cell">${p.name}</td><td>${p.kills}</td><td>${p.deaths}</td><td>${p.assists}</td><td class="${kdClass(p.kills,p.deaths)}">${kd(p.kills,p.deaths)}</td><td class="${pmClass(p.kills,p.deaths)}">${pm(p.kills,p.deaths)}</td>${hasOddball?`<td>${fmtHillOrBall(p.ballSecs)}</td>`:''}${hasCTF?`<td>${p.flagCaps!=null?p.flagCaps:'—'}</td>`:''}${hasKOTH?`<td>${fmtHillOrBall(p.hillSecs)}</td>`:''}</tr>`;
    });
  });
  html += `</tbody></table></div>`;

  html += `<div class="section-title">Game-by-Game Breakdown</div><div class="games-grid">`;
  games.forEach(g => {
    const gOdd=isOddball(g.gameType), gCTF=isCTF(g.gameType), gKOTH=isKOTH(g.gameType);
    const wt = g.winner==='Red'?(g.redTeam||[]):(g.blueTeam||[]);
    let ws1Votes=0, ws2Votes=0;
    wt.forEach(p => { if (getSquad(p.name,squad1,squad2)===1) ws1Votes++; else ws2Votes++; });
    const ws = ws1Votes >= ws2Votes ? 1 : 2;
    const redNames = new Set((g.redTeam||[]).map(p=>p.name));
    html += `<div class="game-card"><div class="game-card-header"><div class="game-card-title">Game ${g.gameNumber} &mdash; ${g.gameType||'Unknown'}</div><div class="game-win-badge badge-s${ws}">Squad ${ws} Wins</div></div><table><thead><tr><th>Player</th><th>Kills</th><th>Deaths</th><th>Assists</th><th>K/D</th><th>+/-</th>${gOdd?'<th>Ball Time</th>':''}${gCTF?'<th>Flag Caps</th>':''}${gKOTH?'<th>Hill Time</th>':''}</tr></thead><tbody>`;
    [1,2].forEach(sq => {
      const sqP = sq===1?[...squad1]:[...squad2];
      const sqColor = sqP.some(n=>redNames.has(n))?'Red':'Blue';
      const pts = sqColor==='Red'?(g.redTeam||[]):(g.blueTeam||[]);
      html += `<tr class="team-divider divider-s${sq}"><td colspan="20">Squad ${sq} <span class="color-tag color-tag-${sqColor.toLowerCase()}">${sqColor}</span></td></tr>`;
      pts.forEach(p => {
        html += `<tr class="row-s${sq}"><td class="player-name-cell">${p.name||'?'}</td><td>${p.kills||0}</td><td>${p.deaths||0}</td><td>${p.assists||0}</td><td class="${kdClass(p.kills||0,p.deaths||0)}">${kd(p.kills||0,p.deaths||0)}</td><td class="${pmClass(p.kills||0,p.deaths||0)}">${pm(p.kills||0,p.deaths||0)}</td>${gOdd?`<td>${fmtHillOrBall(p.ballTime)}</td>`:''}${gCTF?`<td>${p.flagCaps!=null?p.flagCaps:'—'}</td>`:''}${gKOTH?`<td>${fmtHillOrBall(p.hillTime)}</td>`:''}</tr>`;
      });
    });
    html += `</tbody></table></div>`;
  });
  html += `</div>`;

  if (errors.length) html += `<div style="background:rgba(255,85,85,0.1);border:1px solid rgba(255,85,85,0.25);border-radius:8px;padding:12px 16px;font-size:13px;color:#ff5555;margin-top:1rem">Could not read: ${errors.map(e=>`Game ${e.gameNumber}`).join(', ')} — try re-uploading with clearer screenshots.</div>`;

  reportEl.innerHTML = html;
  reportEl.style.display = 'block';
  document.getElementById('exportWrap').style.display = 'block';
  document.getElementById('shareBtnWrap').style.display = 'block';
  document.getElementById('lbBtnWrap').style.display = winner !== 0 ? 'block' : 'none';
  window._lastGames = games;
  window._seriesWinner = winner;
  reportEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('exportBtn').addEventListener('click', () => {
  const t = document.title;
  document.title = 'Lock in H3 — Series Report';
  window.print();
  document.title = t;
});

async function saveReport(games) {
  const resp = await fetch(WORKER_URL+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(games)});
  if (!resp.ok) throw new Error('Failed to save report');
  const {id} = await resp.json();
  return id;
}

async function loadReport(id) {
  const resp = await fetch(WORKER_URL+'/report?id='+encodeURIComponent(id));
  if (resp.status===404) return null;
  if (!resp.ok) throw new Error('Failed to load report');
  return await resp.json();
}

document.getElementById('shareBtn').addEventListener('click', async () => {
  const panel = document.getElementById('sharePanel');
  const btn = document.getElementById('shareBtn');
  if (panel.style.display==='block') { panel.style.display='none'; return; }
  if (!window._lastGames) return;
  panel.style.display='block';
  document.getElementById('shareUrlInput').value='Saving report...';
  document.getElementById('copyBtn').disabled=true;
  btn.disabled=true;
  try {
    const id = await saveReport(window._lastGames);
    document.getElementById('shareUrlInput').value=BASE_URL+'?r='+id;
    document.getElementById('copyBtn').disabled=false;
  } catch(err) { document.getElementById('shareUrlInput').value='Error — check Worker is deployed with KV binding'; }
  btn.disabled=false;
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const input = document.getElementById('shareUrlInput');
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(input.value).catch(()=>{input.select();document.execCommand('copy');});
  btn.textContent='Copied!'; btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
});

(async function() {
  const id = new URLSearchParams(window.location.search).get('r');
  if (!id) return;
  document.querySelector('.upload-zone').style.display='none';
  document.querySelector('.analyze-btn').style.display='none';
  reportEl.style.display='block';
  reportEl.innerHTML='<div style="text-align:center;padding:3rem;color:var(--muted);font-family:\'Barlow Condensed\',sans-serif;font-size:18px;letter-spacing:1px;text-transform:uppercase;">Loading report...</div>';
  const banner = document.createElement('div');
  banner.className='view-only-banner';
  banner.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>&nbsp; Viewing shared series report &mdash; <strong style="margin-left:4px">Lock in H3</strong>';
  document.querySelector('.container').insertBefore(banner,reportEl);
  try {
    const games = await loadReport(id);
    if (!games) { reportEl.innerHTML='<div class="not-found-msg"><h2>Report not found</h2><p>This link may have expired — reports are stored for 90 days.</p></div>'; return; }
    renderReport(games,[]);
    document.getElementById('exportWrap').style.display='block';
    document.getElementById('shareBtnWrap').style.display='none';
    document.getElementById('lbBtnWrap').style.display='none';
  } catch(err) { reportEl.innerHTML='<div class="not-found-msg"><h2>Could not load report</h2><p>'+err.message+'</p></div>'; }
})();
</script>
</body>
</html>
